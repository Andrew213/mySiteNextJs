name: Deploy Front

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build front
        run: |
          npm ci
          npm run build
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 158.160.132.6 >> ~/.ssh/known_hosts

      - name: Deploy standalone build
        run: |
          rsync -avz --delete \
            .next/standalone/ \
            zipper@158.160.132.6:/mnt/data/apps/kochanov-web-next/

      - name: Restart and check application
        run: |
          ssh zipper@158.160.132.6 \
            "sudo -n systemctl restart kochanov-web-next && sleep 3 && curl --fail --silent --show-error http://127.0.0.1:3010 > /dev/null"